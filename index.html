<!DOCTYPE html>
<html>

<head>
<title>For You ❤️</title>

<style>

body{
background:#1a001a;
color:pink;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

<button onclick="startLove()">
Start Mansi ✨
</button>

#message{
display:none;
font-size:30px;
text-align:center;
animation:fadeIn 3s;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

</style>
</head>

<body>

<h1>For Mansi ❤️</h1>

<button onclick="startLove()">
Start
</button>

<div id="message">
You are my bacha my baby my sweety the most special people of my life ❤️

<br><br>

Thank you for always understanding me and loving me Mansi janu 🌹

<br><br>

Meko tumhari simplicity, honesty and smile se pyaar hai ❤️
</div>
<script>

function startLove(){

document.querySelector("button").style.display="none";

document.getElementById("message").style.display="block";

}

</script>

</body>

</html>
